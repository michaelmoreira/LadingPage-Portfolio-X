name: FlowEasy CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "Lint completed with warnings"

  build-artifact:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Build
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            dist/
            build/
            out/
          if-no-files-found: ignore
          retention-days: 1

  security-sast:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

  sca:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Dependency Audit
        run: npm audit --audit-level=high || true

  secrets-scan:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          extra_args: --only-verified

  sbom:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom.spdx.json

  security-dast:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [quality-checks, build-artifact, security-sast, sca, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Build Application
        run: npm run build
      - name: Start Application
        run: |
          npm run start &
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 2
          done
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a"

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact, security-sast, sca, secrets-scan, security-dast]
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  post-deploy-monitoring:
    runs-on: ubuntu-latest
    needs: [deploy-vercel]
    continue-on-error: true
    steps:
      - name: Smoke Test
        env:
          DEPLOY_URL: ${{ needs.deploy-vercel.outputs.deploy_url }}
        run: |
          URL="${DEPLOY_URL:-https://ladingpage-portfolio-x.vercel.app}"
          echo "Testing: $URL"
          sleep 30
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] && echo "Smoke test passed" || { echo "Smoke test failed"; exit 1; }
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_URL: ${{ needs.deploy-vercel.outputs.deploy_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "Slack not configured, skipping"; exit 0; fi
          if [ "$JOB_STATUS" = "success" ]; then COLOR="#36a64f"; else COLOR="#dc3545"; fi
          printf '{"attachments":[{"color":"%s","title":"Deploy %s","text":"%s deployed to %s","footer":"FlowEasy CI/CD"}]}' "$COLOR" "$JOB_STATUS" "michaelmoreira/LadingPage-Portfolio-X" "$DEPLOY_URL" > /tmp/slack_payload.json
          curl -s -m 10 -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d @/tmp/slack_payload.json
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEPLOY_URL: ${{ needs.deploy-vercel.outputs.deploy_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "Discord not configured, skipping"; exit 0; fi
          if [ "$JOB_STATUS" = "success" ]; then COLOR=3066993; else COLOR=15158332; fi
          printf '{"embeds":[{"color":%d,"title":"Deploy %s","description":"%s deployed to %s","footer":{"text":"FlowEasy CI/CD"}}]}' "$COLOR" "$JOB_STATUS" "michaelmoreira/LadingPage-Portfolio-X" "$DEPLOY_URL" > /tmp/discord_payload.json
          curl -s -m 10 -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d @/tmp/discord_payload.json
