name: CI/CD Pipeline

on:
  push:
    branches:
      - circleci
  pull_request:
    branches:
      - circleci

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        run: npm run lint

  sca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run SCA Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep SAST
        run: semgrep --config=p/semgrep

  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Generate SBOM
        uses: cyclonedx/cyclonedx-action@v4

  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Secret Scan
        uses: akashnimare/git-secrets-action@v3

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, sca, sast, sbom, secrets, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Vercel CLI
        run: npm install -g vercel
      - name: Vercel Pull
        run: vercel pull --token ${{ secrets.VERCEL_TOKEN }} --project-id ${{ vars.VERCEL_PROJECT_ID }} --org-id ${{ vars.VERCEL_ORG_ID }}
      - name: Vercel Build
        run: vercel build --token ${{ secrets.VERCEL_TOKEN }}
      - name: Vercel Deploy
        run: vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}