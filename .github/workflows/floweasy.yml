name: CI/CD Pipeline

on:
  push:
    branches:
      - circleci
  pull_request:
    branches:
      - circleci

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run SAST
        uses: github/codeql-action/analyze@v2
        with:
          category: 'sast'

  sca:
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - name: Run SCA
        uses: ossf/scorecard-action@v2
        with:
          results_file_path: results.sarif
      - name: Upload SCA Result
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif

  secrets:
    runs-on: ubuntu-latest
    needs: sca
    steps:
      - uses: actions/checkout@v4
      - name: Detect Secrets
        uses: actions/secret-scan@v1
        with:
          secrets_file: '.github/secrets.yml'

  sbom:
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM 
        run: npm audit --json > sbom.json
      - uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: sbom.json

  dast:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - uses: actions/checkout@v4
      - name: Run DAST
        uses: zaproxy/action-full-scan@v0.0.18
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'https://your-deployed-app-url'

  deploy:
    runs-on: ubuntu-latest
    needs: [dast, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-dir: ./

  monitoring:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Setup Monitoring
        run: echo "Implement monitoring setup here"