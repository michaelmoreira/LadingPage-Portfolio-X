name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Run ESLint
      run: npm run lint

  sast:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Run CodeQL
      uses: github/codeql-action/init@v2
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  sca:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Audit dependencies
      run: npm audit --production --audit-level=moderate

  sbom:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Generate SBOM
      run: cyclonedx-bom -o sbom.xml

  secrets:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Install Gitleaks
      run: |
        curl -sSfL https://raw.githubusercontent.com/zricethezav/gitleaks/main/install.sh | bash
    - name: Scan for secrets
      run: gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif

  build:
    runs-on: ubuntu-latest
    needs: [lint, sast, sca, secrets]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Build project
      run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [build, sbom]
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Vercel CLI
      run: npm install -g vercel
    - name: Pull Vercel environment
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      run: vercel pull --env --yes --token $VERCEL_TOKEN --scope ${{ vars.VERCEL_ORG_ID }}
    - name: Build with Vercel
      run: vercel build
    - name: Deploy to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      run: vercel deploy --prod --token $VERCEL_TOKEN --scope ${{ vars.VERCEL_ORG_ID }}