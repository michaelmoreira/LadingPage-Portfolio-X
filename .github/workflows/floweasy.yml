name: FlowEasy CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "Lint completed with warnings"

  unit-tests:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Run Tests
        run: npm run test -- --passWithNoTests --coverage

  build-artifact:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Build
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            dist/
            build/
            out/
          if-no-files-found: ignore
          retention-days: 1

  security-sast:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

  sca:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Dependency Audit
        run: npm audit --audit-level=high || true

  secrets-scan:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          extra_args: --only-verified

  sbom:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom.spdx.json

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact, security-sast, sca, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E Tests
        run: npx playwright test
      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-dast:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact, security-sast, sca, secrets-scan]
    steps:
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, build-artifact, security-sast, sca, secrets-scan, e2e-tests, security-dast]
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$url" >> $GITHUB_OUTPUT

  post-deploy-monitoring:
    runs-on: ubuntu-latest
    needs: [deploy-vercel]
    steps:
      - name: Smoke Test
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ needs.deploy-vercel.outputs.deploy_url || 'https://LadingPage-Portfolio-X.vercel.app' }}")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed with status $STATUS"
            exit 1
          fi
          echo "Smoke test passed with status $STATUS"