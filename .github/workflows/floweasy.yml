name: FlowEasy CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "Lint completed with warnings"

  build-artifact:
    runs-on: ubuntu-latest
    needs: [quality-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Build
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            dist/
            build/
            out/
          if-no-files-found: ignore
          retention-days: 1

  security-sast:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

  sca:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Dependency Audit
        run: npm audit --audit-level=high || true

  secrets-scan:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          extra_args: --only-verified

  sbom:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact]
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom.spdx.json

  security-dast:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact, security-sast, sca, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Build Application
        run: npm run build
      - name: Start Application
        run: |
          npm run start &
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 2
          done
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a"

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: [quality-checks, build-artifact, security-sast, sca, secrets-scan, security-dast]
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  post-deploy-monitoring:
    runs-on: ubuntu-latest
    needs: [deploy-vercel]
    continue-on-error: true
    steps:
      - name: Smoke Test
        run: |
          DEPLOY_URL="${{ needs.deploy-vercel.outputs.deploy_url }}"
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL="https://ladingpage-portfolio-x.vercel.app"
          fi
          echo "Testing: $DEPLOY_URL"
          sleep 30
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
          echo "HTTP status: $STATUS"
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo "Smoke test passed with status $STATUS"
          else
            echo "Smoke test failed with status $STATUS"
            exit 1
          fi
