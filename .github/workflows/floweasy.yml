name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'stable'
        
      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  sast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'stable'
        
      - name: Install dependencies
        run: npm ci

      - name: Run SAST
        uses: ShiftLeftSecurity/shiftleft-scan-action@v1

  sca:
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Dependency Review
        uses: advanced-security/dependency-review-action@v2

  secrets:
    runs-on: ubuntu-latest
    needs: sca
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Scan for secrets
        uses: actions/[email protected]

  build:
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'stable'
        
      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  sbom:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Generate SBOM
        uses: CycloneDX/cyclonedx-github-action@v1

  deploy:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'stable'
        
      - name: Install Vercel CLI
        run: npm install -g vercel
        
      - name: Vercel Pull
        run: vercel pull --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ vars.VERCEL_ORG_ID }} --project ${{ vars.VERCEL_PROJECT_ID }}

      - name: Vercel Deploy
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --scope ${{ vars.VERCEL_ORG_ID }} --project ${{ vars.VERCEL_PROJECT_ID }}