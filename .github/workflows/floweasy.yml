name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'latest'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'latest'

    - name: Install dependencies
      run: npm ci

    - name: Run Tests
      run: npm run test

  sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install CodeQL CLI
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  sca:
    runs-on: ubuntu-latest
    needs: sast
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Audit npm dependencies
      run: npm audit --audit-level=moderate

  secrets:
    runs-on: ubuntu-latest
    needs: sca
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install TruffleHog
      run: |
        pip install truffleHog

    - name: Run TruffleHog
      run: trufflehog --entropy=False --json .

  sbom:
    runs-on: ubuntu-latest
    needs: secrets
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate SBOM
      run: |
        npm install -g @cyclonedx/bom
        cyclonedx-bom -o bom.xml

  build:
    runs-on: ubuntu-latest
    needs: sbom
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'latest'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 'latest'

    - name: Install Vercel CLI
      run: npm install -g vercel

    - name: Vercel Deployment
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      run: |
        vercel pull --yes --environment=production
        vercel build
        vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}