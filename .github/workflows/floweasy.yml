name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  sast:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2

  sca:
    runs-on: ubuntu-latest
    needs: [sast]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Audit NPM dependencies
        run: npm audit --audit-level=high

  secrets-scan:
    runs-on: ubuntu-latest
    needs: [sca]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Scan for secrets
        uses: github/secret-scanning@v2

  sbom:
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Generate SBOM
        run: npx @cyclonedx/cdxgen

  build:
    runs-on: ubuntu-latest
    needs: [sbom]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install vercel-cli
        run: npm install -g vercel

      - name: Vercel pull
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build

      - name: Deploy with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: prj_p7cN0X1jsjCYLhsbtjXiTDaZxBv1
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}