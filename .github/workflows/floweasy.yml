name: CI/CD Pipeline

on:
  push:
    branches:
      - circleci
  pull_request:
    branches:
      - circleci

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint
  
  secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Trufflehog
        uses: trufflesecurity/trufflehog@v3.1.0
        
      - name: Scan secrets
        run: trufflehog filesystem --only-verified . 

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [lint, secrets]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          
  monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Synthetic Monitoring
        uses: checkly/checkly-action@v2
        with:
          command: run
          test-file: "monitoring/checks.json"
          api-key: ${{ secrets.CHECKLY_API_KEY }}
